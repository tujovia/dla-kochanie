<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dla Natalii ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            background: #fffafa; 
            font-family: 'Montserrat', sans-serif; 
            color: #444; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-bottom: 50px;
        }

        /* Styl dla Twojego zdjęcia na samej górze */
        .hero-img {
            width: 100%;
            max-width: 400px;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .panel {
            background: white;
            width: 90%;
            max-width: 500px;
            margin-top: 20px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: 0.3s;
        }

        /* Nowa, ładna czcionka dla nagłówków */
        h1 { 
            font-family: 'Playfair Display', serif; 
            color: #d63384; 
            font-size: 1.8rem;
            margin: 10px 0;
        }

        .content {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #ffb6c1;
            line-height: 1.6;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 15px;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        .btn-pdf {
            display: inline-block;
            margin-top: 10px;
            padding: 12px 25px;
            background: #d63384;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
        }

        .arrow { float: right; color: #d63384; transition: 0.3s; }
        .active .arrow { transform: rotate(180deg); }
    </style>
</head>
<body>

    <img src="ja.jpg" alt="To ja!" class="hero-img">

    <div class="panel" onclick="togglePanel(this)">
        <h1>Wszystkiego Najlepszego, Natalia! <span class="arrow">▼</span></h1>
        <div class="content">
            Kochanie, w dniu Twoich 24. urodzin życzę Ci, abyś zawsze była tak radosna jak na tym zdjęciu. Jesteś dla mnie wszystkim! ❤️
        </div>
    </div>

    <div class="panel" onclick="togglePanel(this)">
        <h1>Niespodzianka wideo <span class="arrow">▼</span></h1>
        <div class="content">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/TU_WKLEJ_ID_FILMU" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <div class="panel" onclick="togglePanel(this)">
        <h1>Twój Prezent 🎫 <span class="arrow">▼</span></h1>
        <div class="content">
            <p>To nie wszystko! Sprawdź co na Ciebie czeka:</p>
            <a href="bilet.pdf" target="_blank" class="btn-pdf">Otwórz Bilet (PDF)</a>
        </div>
    </div>

    <script>
        function togglePanel(panel) {
            panel.classList.toggle('active');
            var content = panel.querySelector('.content');
            if (content.style.display === "block") {
                content.style.display = "none";
            } else {
                content.style.display = "block";
            }
        }
    </script>

</body>
</html>
