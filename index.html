<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urodziny Kochanie ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,400&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #d63384;
            --accent-dark: #b1256b;
            --bg: #fff5f7;
            --text: #4a4a4a;
        }

        /* Centrowanie wszystkiego na stronie */
        body, html { 
            margin: 0; 
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg); 
            font-family: 'Montserrat', sans-serif; 
            color: var(--text); 
            overflow-x: hidden;
        }

        .flex-center {
            display: flex;
            align-items: center; /* Centrowanie pionowe */
            justify-content: center; /* Centrowanie poziome */
            min-height: 100vh;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        /* --- KARTA STARTOWA (ZIELONA) --- */
        #intro-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 45px rgba(214, 51, 132, 0.1);
            max-width: 450px;
            width: 100%;
            text-align: center;
            transition: all 0.5s ease-out;
        }

        #intro-card h1 { 
            font-family: 'Dancing Script', cursive; 
            font-size: 3rem; 
            color: var(--accent); 
            margin: 0 0 10px 0; 
        }

        .nickname { font-style: italic; color: #8a4d76; margin-bottom: 20px; }

        .btn-present { 
            padding: 18px 35px; 
            font-size: 1.1rem; 
            font-weight: 600;
            background: var(--accent); 
            color: white; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            transition: 0.3s; 
            box-shadow: 0 5px 15px rgba(214, 51, 132, 0.3); 
            margin-top: 20px;
        }

        .btn-present:hover { transform: scale(1.05); background: var(--accent-dark); }

        /* --- PANELE (NIEBIESKA) --- */
        #panels-container {
            width: 100%;
            max-width: 600px;
            display: none; /* Ukryte na starcie */
            opacity: 0;
            transition: opacity 0.6s ease-in;
        }

        .panel {
            background: white;
            margin-bottom: 15px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(214, 51, 132, 0.05);
            cursor: pointer;
            border: 1px solid rgba(214, 51, 132, 0.1);
            transition: 0.3s;
        }

        .panel:hover { transform: translateY(-3px); }

        .panel h2 { 
            font-family: 'Playfair Display', serif; 
            color: var(--accent); 
            font-size: 1.4rem; 
            margin: 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .content {
            display: none;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
            text-align: left;
        }

        .letter-text { white-space: pre-wrap; color: #555; font-size: 1rem; }

        .video-container {
            position: relative; padding-bottom: 56.25%; height: 0;
            border-radius: 10px; overflow: hidden; background: #000;
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .btn-pdf {
            display: inline-block; margin-top: 15px; padding: 12px 30px;
            background: var(--accent); color: white; text-decoration: none;
            border-radius: 50px; font-weight: 600;
        }

        .arrow { font-size: 0.8rem; transition: 0.3s; }
        .active .arrow { transform: rotate(180deg); }
        .active .content { display: block; }
    </style>
</head>
<body>

    <div class="flex-center">
        
        <div id="intro-card">
            <h1>KOOOCHAAANIEEE</h1>
            <div class="nickname">Wszystkiego Najlepszego 🎂</div>
            <p>24 lata za Tobą, a kolejne 80 ze mną 🫶</p>
            <button class="btn-present" onclick="revealSurprise()">Kliknij tutaj hihihi 🎁</button>
        </div>

        <div id="panels-container">
            
            <div class="panel" onclick="togglePanel(this)">
                <h2>Kilka słów ode mnie, uwu <span class="arrow">▼</span></h2>
                <div class="content">
                    <div class="letter-text">Tutaj wpisz swój tekst...</div>
                </div>
            </div>

            <div class="panel" onclick="togglePanel(this)">
                <h2>Nie taka niespodzianka... <span class="arrow">▼</span></h2>
                <div class="content">
                    <div class="video-container">
                        <iframe id="yt-player" data-video-id="TU_WKLEJ_ID_FILMU" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                    </div>
                </div>
            </div>

            <div class="panel" onclick="togglePanel(this)">
                <h2>Ostatnia sprawa... <span class="arrow">▼</span></h2>
                <div class="content" style="text-align: center;">
                    <p>Wiesz już o tym prezencie... 🫶</p>
                    <a href="bilet.pdf" target="_blank" class="btn-pdf">Odbierz bilet</a>
                </div>
            </div>

        </div>

    </div>

    <script>
        function revealSurprise() {
            const card = document.getElementById('intro-card');
            const panels = document.getElementById('panels-container');

            card.style.opacity = '0';
            setTimeout(() => {
                card.style.display = 'none';
                panels.style.display = 'block';
                setTimeout(() => { panels.style.opacity = '1'; }, 50);
            }, 500);
        }

        function togglePanel(panel) {
            const isOpen = panel.classList.contains('active');
            document.querySelectorAll('.panel').forEach(p => {
                p.classList.remove('active');
                const ifr = p.querySelector('iframe');
                if(ifr) ifr.src = "";
            });

            if (!isOpen) {
                panel.classList.add('active');
                const player = panel.querySelector('#yt-player');
                if (player) {
                    const id = player.getAttribute('data-video-id');
                    player.src = `https://www.youtube.com/embed/${id}?autoplay=1`;
                }
            }
        }
    </script>
</body>
</html>
