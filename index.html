<!DOCTYPE html>

<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dla Mojego Kochanie ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #fff5f7; font-family: 'Montserrat', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .container { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(214, 51, 132, 0.1); max-width: 90%; }
        h1 { font-family: 'Dancing Script', cursive; font-size: 3rem; color: #d63384; margin: 0; }
        .nickname { font-style: italic; color: #8a4d76; margin-bottom: 20px; }
        .btn-present { padding: 15px 30px; font-size: 1.2rem; background: #d63384; color: white; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(214, 51, 132, 0.3); }
        .btn-present:hover { transform: scale(1.05); }
        #video-container { display: none; margin-top: 20px; width: 100%; max-width: 500px; }
        iframe { width: 100%; height: 280px; border-radius: 15px; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Wszystkiego Najlepszego<br>Natalia!</h1>
        <div class="nickname">Kocham cię 💕 </div>
        <p>Dziś są Twoje urodziny! 🎂</p>
        <button class="btn-present" onclick="showVideo()"> Prezent numer 1 🎁❗️ </button>
        <div id="video-container">
            <iframe id="player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>
    <script>
        function showVideo() {
            const videoId = "TU_WKLEJ_ID_Z_YOUTUBE"; // Zmienisz to później
            document.getElementById('player').src = "https://www.youtube.com/embed/" + videoId + "?autoplay=1";
            document.getElementById('video-container').style.display = 'block';
        }
    </script>
</body>
</html>
