<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urodziny Natalii ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            background: #fffafa; 
            font-family: 'Montserrat', sans-serif; 
            color: #444; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .panel {
            background: white;
            width: 90%;
            max-width: 500px;
            margin-top: 20px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: 0.3s;
        }

        /* Nowa, ładna czcionka dla nagłówków */
        h1 { 
            font-family: 'Playfair Display', serif; 
            color: #d63384; 
            font-size: 1.8rem;
            margin: 0;
            display: inline-block;
        }

        .nickname {
            font-style: italic;
            color: #8a4d76;
            margin-bottom: 20px;
        }

        .content {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #ffb6c1;
            line-height: 1.6;
            text-align: left;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 15px;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        .btn-pdf {
            display: inline-block;
            margin-top: 10px;
            padding: 12px 25px;
            background: #d63384;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-pdf:hover {
            transform: scale(1.05);
        }

        .arrow { float: right; color: #d63384; transition: 0.3s; }
        .active .arrow { transform: rotate(180deg); }
    </style>
</head>
<body>

    <div class="panel" onclick="togglePanel(this)">
        <h1>Najlepszego, Natalia! <span class="arrow">▼</span></h1>
        <div class="nickname">„Moje Kochanie”</div>
        <div class="content">
            Dziś są Twoje 24. urodziny! ✨<br>
            Moje Kochanie, mam dla Ciebie coś specjalnego. Kiedyś powiedziałaś, że chciałabyś to dostać... ❤️
        </div>
    </div>

    <div class="panel" onclick="togglePanel(this)">
        <h1>Prezent Numer 1 <span class="arrow">▼</span></h1>
        <div class="content">
            <div class="video-wrapper">
                <iframe id="youtube-player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <div class="panel" onclick="togglePanel(this)">
        <h1>Prezent Numer 2 <span class="arrow">▼</span></h1>
        <div class="content">
            <p>To jeszcze nie wszystko! Twój bilet czeka:</p>
            <a href="bilet.pdf" target="_blank" class="btn-pdf">Otwórz Bilet (PDF)</a>
        </div>
    </div>

    <script>
        function togglePanel(panel) {
            panel.classList.toggle('active');
            var content = panel.querySelector('.content');
            var player = panel.querySelector('#youtube-player');
            
            if (content.style.display === "block") {
                content.style.display = "none";
                if (player) { player.src = ""; } // Zatrzymaj film po zamknięciu
            } else {
                content.style.display = "block";
                if (player) {
                    // Zmień poniższe ID na to z Twojego filmu na YouTube
                    var videoId = "TU_WKLEJ_ID_Z_YOUTUBE";
                    player.src = "https://www.youtube.com/embed/" + videoId + "?autoplay=1";
                }
            }
        }
    </script>

</body>
</html>
